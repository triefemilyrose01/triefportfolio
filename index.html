<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uncanny Valley - Emily Trief</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-pattern" id="bg-pattern"></div>
  <div class="floating-doodles" id="floating-doodles"></div>

  <header class="app-header">
    <div class="header-container">
      <a href="index.html" class="logo-area">
        <span class="logo-emoji">✨</span>
        <span class="logo-text">Emily Trief</span>
      </a>
      <nav class="nav-links" aria-label="Main Navigation">
        <a href="index.html" class="nav-link">← Back to Home</a>
      </nav>
    </div>
  </header>

  <main style="display: flex; flex-direction: column; align-items: flex-start; padding: 15px 20px 40px; font-family: 'Fredoka', sans-serif;">

    <div style="max-width: 600px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; align-items: flex-start; gap: 20px;">

      <h1 style="font-size: 2.5rem; color: var(--text-color, #333); margin: 0; text-align: left;">
        <span class="title-emoji">🔥</span> Uncanny Valley
      </h1>

      <div style="width: 100%; background: white; padding: 15px; border-radius: 24px; box-shadow: 0 8px 16px rgba(0,0,0,0.05); box-sizing: border-box;">
        <img src="Assets/uncanny-valley.png" alt="Uncanny Valley Project Image" style="width: 100%; height: auto; border-radius: 12px; display: block;">
      </div>

    </div>
  </main>

  <script src="script.js"></script>

</html>
